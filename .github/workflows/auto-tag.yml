name: Auto Tag on Merge

on:
  pull_request:
    branches: [ master, main ]
    types:
      - closed
  workflow_dispatch:

jobs:
  create-tag:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Git configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Generate new tag
        id: new_tag
        run: |
          current_date=$(date +"%Y-%m-%d")
          last_tag=$(git tag --list "[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1)

          if [ -z "$last_tag" ]; then
            NEW_TAG="1.0.0"
          else
            X=$(echo "$last_tag" | cut -d. -f1)
            Y=$(echo "$last_tag" | cut -d. -f2)
            Z=$(echo "$last_tag" | cut -d. -f3)

            tag_date=$(git log -1 --format=%ai "$last_tag" | cut -d' ' -f1)

            if [ "$current_date" = "$tag_date" ]; then
              Z=$((Z + 1))
            else
              Y=$((Y + 1))
              Z=0
              if [ $Y -gt 6 ]; then
                Y=0
                X=$((X + 1))
              fi
            fi

            NEW_TAG="${X}.${Y}.${Z}"
          fi

          echo "Tag created: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.new_tag.outputs.tag }}
          git push origin ${{ steps.new_tag.outputs.tag }}
